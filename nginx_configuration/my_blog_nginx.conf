# Nginx Server Block Configuration for Hugo Site
#
# This file would typically be placed at: /etc/nginx/sites-available/my-blog
# And then enabled via a symbolic link:
# sudo ln -s /etc/nginx/sites-available/my-blog /etc/nginx/sites-enabled/my-blog
# (In most cases, you will remove a default file from sites-enabled/ and
# leave it as reference inside of sites-available where it will continue to be
# updated by the nginx packaging team.)

# Remember to test configuration: sudo nginx -t
# And reload Nginx to apply changes: sudo systemctl reload nginx



server {
    listen 80;
    listen [::]:80;

    # Optional but recommended: Define a server name
    # server_name yourdomain.com www.yourdomain.com;

    # The 'root' and 'index' directives below are not strictly necessary
    # if all requests under '/' are proxied. However, they don't hurt
    # and might be useful if you later add other location blocks to serve
    # specific static files locally.
    root /var/www/html/my-blog;
    index index.html index.htm;

    location / {
        # Proxy all requests matching this location to your Azure app
        proxy_pass http://wuweb.westeurope.cloudapp.azure.com;

        # --- IMPORTANT PROXY HEADERS ---
        # These headers help your backend application understand the original request
        proxy_set_header Host $host;                     # Passes the original Host header from the client
        proxy_set_header X-Real-IP $remote_addr;         # Passes the real client IP address
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Appends the client IP (and any prior proxies)
        proxy_set_header X-Forwarded-Proto $scheme;      # Tells the backend if the original request was http or https

        # Optional: For WebSocket support, if your Azure app uses WebSockets
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";

        # Optional: Adjust timeouts if your backend is sometimes slow
        # proxy_connect_timeout 60s;
        # proxy_send_timeout 60s;
        # proxy_read_timeout 60s;
    }

    # Optional: Custom error pages for Nginx-level errors (e.g., 502 Bad Gateway if proxy fails)
    # These HTML files would need to exist, perhaps in /usr/share/nginx/html/ or your 'root'
    # error_page 502 503 504 /50x.html;
    # location = /50x.html {
    #     root /usr/share/nginx/html; # Nginx's default error page location
    #     internal;
    # }

    # Logging
    access_log /var/log/nginx/my-awesome-blog.access.log;
    error_log /var/log/nginx/my-awesome-blog.error.log;
}
